<body>
    <div id="yew-app"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var ytPlayers = [];
        var ytReady = false;

        function onYouTubeIframeAPIReady() {
            ytReady = true;
            initExistingIframes();
        }

        function initPlayer(iframe) {
            if (!iframe.id) {
                iframe.id = 'yt-' + Math.random().toString(36).substr(2, 9);
            }
            
            // Check if player already initialized for this iframe
            if (iframe.dataset.ytInitialized) return;
            iframe.dataset.ytInitialized = "true";

            var player = new YT.Player(iframe.id, {
                events: {
                    'onStateChange': function(event) {
                        if (event.data === YT.PlayerState.PLAYING) {
                            // Pause/reset all other players
                            ytPlayers.forEach(function(p) {
                                if (p !== player && typeof p.pauseVideo === 'function') {
                                    p.pauseVideo();
                                    // p.seekTo(0); // If strict "reset" is needed
                                }
                            });
                        }
                    }
                }
            });
            ytPlayers.push(player);
        }

        function initExistingIframes() {
            document.querySelectorAll('iframe[src*="youtube.com/embed"]').forEach(function(iframe) {
                initPlayer(iframe);
            });
        }

        // Watch for new iframes added by Yew's virtual DOM
        var observer = new MutationObserver(function(mutations) {
            if (!ytReady) return;
            mutations.forEach(function(mutation) {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === 1) { // ELEMENT_NODE
                        if (node.tagName === 'IFRAME' && node.src && node.src.includes('youtube.com/embed')) {
                            initPlayer(node);
                        } else {
                            // Search within the added node
                            node.querySelectorAll('iframe[src*="youtube.com/embed"]').forEach(function(iframe) {
                                initPlayer(iframe);
                            });
                        }
                    }
                });
            });
        });

        observer.observe(document.body, { childList: true, subtree: true });
    </script>
